name: Deploy Cloud SQL Loader

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-cloudsql-loader.yml
      - Dockerfile.cloudsql-loader
      - jobs/load_s3_to_cloudsql.py
      - requirements-cloudsql-loader.txt
      - common/**
      - utils/**
      - terraform/gcp-cloudsql-loader/**
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  IMAGE_NAME: s3-to-cloudsql
  TF_IN_AUTOMATION: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build and push image
        id: build
        env:
          IMAGE_URI: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          docker build -f Dockerfile.cloudsql-loader -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Terraform init
        working-directory: terraform/gcp-cloudsql-loader
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: terraform/gcp-cloudsql-loader
        env:
          TF_VAR_image_uri: ${{ steps.build.outputs.image_uri }}
        run: terraform apply -input=false -auto-approve

      - name: Show deployed job
        run: |
          gcloud run jobs describe s3-to-cloudsql-daily-pricing \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --region "${GCP_REGION}" \
            --format "table(metadata.name,status.latestCreatedExecution.name)"
